<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Cart | FashionStore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../style.css">
</head>

<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- CART SECTION -->
<section class="container my-5 pt-5">

  <h2 class="text-center mb-4 fw-bold">Your Shopping Cart</h2>

  <div class="row">
    
    <!-- CART ITEMS -->
    <div id="cart-items" class="col-lg-8 row"></div>

    <!-- SUMMARY -->
    <div class="col-lg-4">

      <div class="card shadow p-3">
        <h4 class="mb-3">Price Details</h4>

        <ul class="list-group mb-3" id="price-breakdown"></ul>

        <div class="d-flex justify-content-between fw-bold fs-5">
          <span>Total Amount</span>
          <span>₹<span id="total-price">0</span></span>
        </div>

        <button id="checkout-btn" class="btn btn-primary btn-lg w-100 mt-3">
          Checkout
        </button>

      </div>

    </div>

  </div>
</section>

<!-- Scripts -->
<script src="../config.js"></script>
<script src="../components/navbar.js"></script>
<script src="cart.js"></script>

</body>
</html>
