<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Your Cart | FashionStore</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body data-protected="true"> <!-- protect cart page -->

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- CART CONTENT -->
<section class="container my-5 pt-5">
  <h2 class="text-center mb-4">Your Shopping Cart</h2>

  <div id="cart-items" class="row"></div>

  <!-- Cart Summary -->
  <div class="card mt-4 shadow">
    <div class="card-body">
        <h4 class="mb-3">Price Details</h4>

        <!-- Item-wise total -->
        <ul class="list-group mb-3" id="price-breakdown"></ul>

        <div class="d-flex justify-content-between fw-bold fs-5">
          <span>Total Amount</span>
          <span>₹<span id="total-price">0</span></span>
        </div>

        <button id="checkout-btn" class="btn btn-primary btn-lg w-100 mt-3">
          Checkout
        </button>
    </div>
  </div>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Navbar Loader -->
<script src="./components/navbar.js"></script>

<!-- Auth (IMPORTANT for protection) -->
<script src="./auth/auth.js"></script>

<!-- Cart JS -->
<script src="cart.js"></script>

</body>
</html>
